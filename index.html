// Week 3 starts Monday June 29, 2026
const WEEK3_START = new Date(2026, 5, 29); // June 29 2026
function getWeekDates(weekNum) {
  // Returns object with Mon-Sun dates for given week number
  const offset = (weekNum - 3) * 7;
  const monday = new Date(WEEK3_START);
  monday.setDate(monday.getDate() + offset);
  const dates = {};
  ALLDAYS.forEach((d, i) => {
    const date = new Date(monday);
    date.setDate(date.getDate() + i);
    dates[d] = date;
  });
  return dates;
}
function fmtDate(date) {
  return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function fmtWeekRange(weekNum) {
  const dates = getWeekDates(weekNum);
  const mon = dates["Mon"], fri = dates["Fri"];
  return `${mon.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${fri.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
}

// Get the workout template assigned to a given day.

function getDayWorkout(dayKey){

  const assigned=S.dayAssign?.[W]?.[dayKey];
  if(assigned&&prog[assigned])return{...prog[assigned],assignedFrom:assigned};
  if(prog[dayKey])return prog[dayKey];
  return null; // Sat/Sun with no assignment
}

function def(){return{week:3,logs:{},meals:{},bodyweight:{},checkins:{},water:{},missed:{},supps:{},steps:{},exnotes:{},wtimes:{},mode:"gym",dayAssign:{},macros:{},profile:null,exskip:{}};}
function loadS(){
  try{
    // Try current key first
    let d=null;
    try{d=JSON.parse(localStorage.getItem(KEY));}catch{}
    const dScore=d?Object.keys(d.logs||{}).length+Object.keys(d.meals||{}).length:-1;
    if(d&&dScore>0)return{...def(),...d};
    // Current key empty or has no data — check ALL older keys and take whichever has the most logged data
    let best=d,bestScore=dScore;
    for(const ok of OLD_KEYS){
      try{
        const old=JSON.parse(localStorage.getItem(ok));
        if(old){
          const score=Object.keys(old.logs||{}).length+Object.keys(old.meals||{}).length;
          if(score>bestScore){best=old;bestScore=score;}
        }
      }catch{}
    }
    if(best&&bestScore>0){
      const migrated={...def(),...best};
      try{localStorage.setItem(KEY,JSON.stringify(migrated));}catch{}
      return migrated;
    }
    return d?{...def(),...d}:def();
  }catch{return def();}
}

function bestSet(el){if(!el)return null;let b=0;Object.values(el).forEach(s=>{if(parseFloat(s.w)>b)b=parseFloat(s.w);});return b||null;}
function totalVol(el){if(!el)return 0;let v=0;Object.values(el).forEach(s=>{v+=(parseFloat(s.w)||0)*(parseFloat(s.r)||0);});return Math.round(v);}
function exTrend(d,ei){
  return Object.keys(S.logs).sort((a,b)=>+a.slice(1)-+b.slice(1))
    .map(w=>({week:+w.slice(1),weight:bestSet(S.logs[w]?.[d]?.[ei]),vol:totalVol(S.logs[w]?.[d]?.[ei])}))
    .filter(p=>p.weight);
}
function weeklyVols(){
  return Object.keys(S.logs).sort((a,b)=>+a.slice(1)-+b.slice(1))
    .map(w=>{let t=0;DAYS.forEach(d=>Object.values(S.logs[w]?.[d]||{}).forEach(e=>{t+=totalVol(e);}));return{week:+w.slice(1),vol:t};})
    .filter(p=>p.vol>0);
}
function allGains(){
  const g=[];
  DAYS.forEach(d=>getPROG()[d].exercises.forEach((ex,ei)=>{
    const t=exTrend(d,ei);
    if(t.length>=2){const f=t[0].weight,l=t[t.length-1].weight;g.push({name:ex.name,first:f,last:l,pct:Math.round(((l-f)/f)*100),day:d,ei});}
  }));
  return g.sort((a,b)=>b.pct-a.pct);
}
function getPRs(){
  const prs=[];
  DAYS.forEach(d=>getPROG()[d].exercises.forEach((ex,ei)=>{
    let best=0,bestWk=null;
    Object.keys(S.logs).forEach(w=>{const b=bestSet(S.logs[w]?.[d]?.[ei]);if(b&&b>best){best=b;bestWk=+w.slice(1);}});
    if(best>0)prs.push({name:ex.name,weight:best,week:bestWk,day:d});
  }));
  return prs.sort((a,b)=>b.weight-a.weight);
}
// Full PR progression for one exercise — each time a new all-time best was set
function getPRHistory(d,ei){
  const weeks=Object.keys(S.logs).sort((a,b)=>+a.slice(1)-+b.slice(1));
  const milestones=[];
  let runningBest=0;
  weeks.forEach(w=>{
    const b=bestSet(S.logs[w]?.[d]?.[ei]);
    if(b&&b>runningBest){
      const gain=runningBest>0?b-runningBest:0;
      milestones.push({week:+w.slice(1),weight:b,gain});
      runningBest=b;
    }
  });
  return milestones;
}
// Count total PRs set across all exercises
function countTotalPRs(){
  let count=0;
  DAYS.forEach(d=>getPROG()[d].exercises.forEach((ex,ei)=>{
    count+=getPRHistory(d,ei).filter(m=>m.gain>0).length;
  }));
  return count;
}
function isPR(d,ei,weight){
  if(!weight)return false;
  let best=0;
  Object.keys(S.logs).forEach(w=>{if(w===wk(S.week))return;const b=bestSet(S.logs[w]?.[d]?.[ei]);if(b&&b>best)best=b;});
  return parseFloat(weight)>best&&best>0;
}

function barChart(data,vk){
  if(!data.length)return`<div class="empty">Log 2+ weeks to see trend</div>`;
  const max=Math.max(...data.map(d=>d[vk]),1);
  return`<div class="bcwrap"><div class="bc">${data.map(d=>{const h=Math.max(4,Math.round((d[vk]/max)*80));return`<div class="bcol"><div class="bar" style="height:${h}px"></div><div class="blbl">Wk${d.week}</div></div>`;}).join("")}</div></div>`;
}
function lineChart(data,key="weight"){
  if(data.length<2)return`<div class="empty">Log one more week to see trend</div>`;
  const W=300,H=70,pad=8,vals=data.map(d=>d[key]),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=data.map((d,i)=>({x:pad+i*(W-pad*2)/(data.length-1),y:H-pad-(d[key]-mn)/rng*(H-pad*2),v:d[key],wk:d.week}));
  return`<svg viewBox="0 0 ${W} ${H}" class="lc" style="height:80px"><polyline points="${pts.map(p=>`${p.x},${p.y}`).join(" ")}" fill="none" stroke="${G}" stroke-width="2" stroke-linejoin="round"/>${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${G}"/><text x="${p.x}" y="${H}" text-anchor="middle" font-size="8" fill="#555">Wk${p.wk}</text>`).join("")}</svg>`;
}

// ── PDF Upload ────────────────────────────────────────────────────────────────
async function readPDFB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});}
let parseStatus="",parsedPlan=null,parsedMeals=null,workoutPasteText="",mealPasteText="";

async function handlePDFUpload(input,type){
  const file=input.files[0];if(!file)return;
  parseStatus=type==="workout"?"loading-workout":"loading-meal";parsedPlan=null;parsedMeals=null;re();
  try{
    const b64=await readPDFB64(file);
    const prompt=type==="workout"?
      `Extract the complete workout plan from this PDF. Return ONLY valid JSON:\n{"Mon":{"label":"Monday","focus":"Back / Biceps","exercises":[{"name":"Exercise Name","sets":4,"reps":"20,15,10,10"}]},"Tue":{...},"Wed":{...},"Thu":{...},"Fri":{...}}\nRules: Mon/Tue/Wed/Thu/Fri keys. reps comma-separated per set. Supersets join names with " superset ".`:
      `Extract the complete meal plan from this PDF. Return ONLY valid JSON array:\n[{"name":"Meal 1 — Pre Workout A.M.","items":["Egg White (raw) — 160g","Whole Egg — 2"]},...]\nPreserve meal timing labels and quantities exactly.`;
    const result=await callAI(prompt,b64);
    const parsed=JSON.parse(result.replace(/```json|```/g,"").trim());
    if(type==="workout"){
      if(!["Mon","Tue","Wed","Thu","Fri"].some(d=>parsed[d]?.exercises?.length>0))throw new Error();
      parsedPlan=parsed;parseStatus="ok-workout";
    }else{
      if(!Array.isArray(parsed)||!parsed.length)throw new Error();
      parsedMeals=parsed;parseStatus="ok-meal";
    }
  }catch{parseStatus=type==="workout"?"err-workout":"err-meal";}
  re();
}
async function parseWorkoutPlan(text){
  if(!text?.trim()){alert("Please paste your workout plan first.");return;}
  parseStatus="loading-workout";parsedPlan=null;re();
  try{
    const result=await callAI(`Parse this workout plan into JSON. Return ONLY valid JSON:\n{"Mon":{"label":"Monday","focus":"Back / Biceps","exercises":[{"name":"Exercise Name","sets":4,"reps":"20,15,10,10"}]},"Tue":{...},"Wed":{...},"Thu":{...},"Fri":{...}}\nRules: Mon/Tue/Wed/Thu/Fri keys. reps comma-separated string. sets integer. Supersets join with " superset ".\n\nPlan:\n${text}`);
    const parsed=JSON.parse(result.replace(/```json|```/g,"").trim());
    if(!["Mon","Tue","Wed","Thu","Fri"].some(d=>parsed[d]?.exercises?.length>0))throw new Error();
    parsedPlan=parsed;parseStatus="ok-workout";
  }catch{parseStatus="err-workout";parsedPlan=null;}
  re();
}
async function parseMealPlan(text){
  if(!text?.trim()){alert("Please paste your meal plan first.");return;}
  parseStatus="loading-meal";parsedMeals=null;re();
  try{
    const result=await callAI(`Parse this meal plan into JSON array. Return ONLY valid JSON:\n[{"name":"Meal 1 — Pre Workout A.M.","items":["Egg White (raw) — 160g"]},{"name":"Meal 2","items":["Rice Cakes — 1"]}]\nPreserve meal timing labels and quantities.\n\nMeal plan:\n${text}`);

        <label style="display:block;width:100%;padding:12px;border-radius:8px;border:1px solid #C9A92C;background:transparent;color:#C9A92C;font-size:12px;font-weight:800;text-align:center;cursor:pointer;box-sizing:border-box">
          ⬆️ Restore From Backup
          <input type="file" accept=".json,application/json" style="display:none" onchange="importData(this)">
        </label>
        <div style="font-size:10px;color:#555;margin-top:10px;line-height:1.5">Tip: Export weekly and save the file to iCloud Drive or email it to yourself. Your training history is worth protecting.</div>
      </div></div>

      <div class="ss"><div class="ss-title" style="color:#f87171">⚠️ Data</div>
      <div class="card" style="padding:14px">
        <div style="font-size:11px;color:#888;margin-bottom:10px">Reset removes ALL logged data. Plan is kept. Cannot be undone.</div>
        <button onclick="if(confirm('Delete all logged data?')){S.logs={};S.meals={};S.bodyweight={};S.checkins={};S.water={};S.missed={};S.supps={};S.steps={};S.exnotes={};S.wtimes={};saveS(S);re();}" style="width:100%;padding:12px;border-radius:8px;border:1px solid #f87171;background:transparent;color:#f87171;font-size:12px;font-weight:700">Reset All Logged Data</button>
      </div></div>
    </div>`;
  }

  html+=`<div style="padding:14px 16px 0;font-size:10px;color:#222;text-align:center">+2.5–5 lbs/week · 60s rest · Mind-to-muscle every rep</div>`;
  app.innerHTML=html;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function chWeek(d){S.week=Math.max(1,S.week+d);saveS(S);re();}
function setTab(t){activeTab=t;re();}
function setDay(d){activeDay=d;re();}
function setAView(v){aView=v;re();}
function setSet(day,ei,si,field,val){
  const w=wk(S.week);
  if(!S.logs[w])S.logs[w]={};if(!S.logs[w][day])S.logs[w][day]={};
  if(!S.logs[w][day][ei])S.logs[w][day][ei]={};if(!S.logs[w][day][ei][si])S.logs[w][day][ei][si]={};
  S.logs[w][day][ei][si][field]=val;saveS(S);
  if(field==="w"&&val)startTimer();
  re();
}
function setExNote(day,ei,val){
  const w=wk(S.week);
  if(!S.exnotes[w])S.exnotes[w]={};if(!S.exnotes[w][day])S.exnotes[w][day]={};
  S.exnotes[w][day][ei]=val;saveS(S);
}
function toggleSkip(day,ei){
  const w=wk(S.week);
  if(!S.exskip[w])S.exskip[w]={};
  if(!S.exskip[w][day])S.exskip[w][day]={};
  S.exskip[w][day][ei]=!S.exskip[w][day][ei];
  saveS(S);re();
}
function toggleMeal(day,mi){
  const w=wk(S.week);if(!S.meals[w])S.meals[w]={};if(!S.meals[w][day])S.meals[w][day]={};
  S.meals[w][day][mi]=!S.meals[w][day][mi];saveS(S);re();
}
function toggleSupp(day,si){
  const w=wk(S.week);if(!S.supps[w])S.supps[w]={};if(!S.supps[w][day])S.supps[w][day]={};
  S.supps[w][day][si]=!S.supps[w][day][si];saveS(S);re();
}
function setNote(val){const w=wk(S.week);if(!S.meals[w])S.meals[w]={};S.meals[w].notes=val;saveS(S);}
function setWater(day,cups){const w=wk(S.week);if(!S.water[w])S.water[w]={};S.water[w][day]=cups;saveS(S);re();}
function setSteps(day,val){const w=wk(S.week);if(!S.steps[w])S.steps[w]={};S.steps[w][day]=parseInt(val)||0;saveS(S);}
function setCheckin(field,val){
  const w=wk(S.week);if(!S.checkins[w])S.checkins[w]={};if(!S.checkins[w][activeDay])S.checkins[w][activeDay]={};
  S.checkins[w][activeDay][field]=val;saveS(S);re();
}
function setBW(val){const w=wk(S.week);S.bodyweight[w]=parseFloat(val)||null;saveS(S);}
function toggleMissed(day){
  const w=wk(S.week);if(!S.missed[w])S.missed[w]={};
  if(S.missed[w][day])delete S.missed[w][day];else S.missed[w][day]={reason:""};
  saveS(S);re();
}
function setMissedReason(day,val){const w=wk(S.week);if(S.missed[w]?.[day])S.missed[w][day].reason=val;saveS(S);}
function setMode(mode){S.mode=mode;S.customProgram=null;saveS(S);re();}
function assignDay(weekendDay,sourceDay){
  const w=wk(S.week);
  if(!S.dayAssign[w])S.dayAssign[w]={};
  if(sourceDay===null)delete S.dayAssign[w][weekendDay];
  else S.dayAssign[w][weekendDay]=sourceDay;
  saveS(S);re();
}
function setRecDay(d){recDay=d;re();}
function setRecovery(day,field,val){
  const w=wk(S.week);
  if(!S.checkins[w])S.checkins[w]={};
  if(!S.checkins[w][day])S.checkins[w][day]={};
  S.checkins[w][day][field]=val;
  saveS(S);re();
}
function togglePR(id){prOpen=prOpen===id?null:id;re();}

// ── AI Coach Chat ─────────────────────────────────────────────────────────────
function buildCoachContext(){
  const w=wk(S.week);
  const now=new Date();
  const gains=allGains();
  const vols=weeklyVols();
  const bwE=Object.entries(S.bodyweight||{}).sort((a,b)=>+a[0].slice(1)-+b[0].slice(1));
  const latestBW=bwE.length?bwE[bwE.length-1][1]:null;
  const targets=S.macros?.targets;
  const goal=S.macros?.goal||"recomp";
  // Today's meals eaten
  const todayDayKey=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][now.getDay()];
  const todayMeals=S.meals[w]?.[todayDayKey]||{};
  const eaten=MEALS.filter((_,i)=>todayMeals[i]).map(m=>m.name);
  const notEaten=MEALS.filter((_,i)=>!todayMeals[i]).map(m=>m.name);
  // Today's workout if logged
  const todayLog=S.logs[w]?.[todayDayKey];
  const todayWorkout=todayLog?Object.keys(todayLog).length+" exercises logged today":"No workout logged today";
  // Recent check-in
  const ci=S.checkins[w]?.[todayDayKey]||{};
  // Water
  const water=S.water[w]?.[todayDayKey]||0;

  return `CONTEXT ABOUT ${P().name.toUpperCase()}:
- ${P().name}, ${pHeight()}${latestBW?", "+latestBW+" lbs":", started at "+P().startWeight+" lbs"}, trains ${P().schedule} Mon-Fri
- Program: Sin Pausa (${S.mode==="gym"?"Gym":"Home"} Edition), Week ${S.week}, progressive overload
- Goal: ${goal==="recomp"?"body recomposition":goal==="fatloss"?"fat loss":"lean bulk"}
${targets?`- Daily targets: ${targets.calories} kcal, ${targets.protein}g protein, ${targets.carbs}g carbs, ${targets.fat}g fat`:""}
- Today is ${now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}, current device time: ${now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
- Bedtime target: ${P().bedtime}
- MEALS EATEN TODAY: ${eaten.length?eaten.join(", "):"none checked off yet"}
- MEALS REMAINING: ${notEaten.length?notEaten.join(", "):"all done"}
- Water today: ${water}/16 cups
- ${todayWorkout}
${ci.energy?`- Today's check-in: energy ${ci.energy}/5, soreness ${ci.soreness||"–"}/5, sleep ${ci.sleep||"–"}hrs`:""}
- Weeks logged: ${vols.length}. Top strength gains: ${gains.slice(0,3).map(g=>`${g.name} +${g.pct}%`).join(", ")||"none yet"}
- His meal plan: ${MEALS.map((m,i)=>`Meal ${i+1}: ${m.items.join(", ")}`).join(" | ")}

You are ${P().name}'s personal coach in the Sin Pausa app. Be direct, practical, motivating but not cheesy. Give specific numbers when relevant. Keep answers SHORT — 2-5 sentences unless he asks for detail. If he mentions a time-sensitive situation, use the device time above. Never suggest staying up past their bedtime.`;
}

async function sendCoachMsg(){
  const input=document.getElementById("coachInput");
  const msg=input?input.value.trim():"";
  if(!msg||coachLoading)return;
  coachChat.push({role:"user",content:msg});
  coachLoading=true;
  if(input)input.value="";
  re();
  scrollCoach();
  try{
    const messages=[
      {role:"user",content:buildCoachContext()+"\n\nConversation starts now."},
      {role:"assistant",content:"Got it. I'm ready to coach — what's up?"},
      ...coachChat
    ];
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages})
    });
    const d=await r.json();
    const reply=d.content?.[0]?.text||"Couldn't reach your coach — check connection.";
    coachChat.push({role:"assistant",content:reply});
  }catch{
    coachChat.push({role:"assistant",content:"Connection issue — try again in a moment."});
  }
  coachLoading=false;
  re();
  scrollCoach();
}
function scrollCoach(){
  setTimeout(()=>{
    const box=document.getElementById("coachMsgs");
    if(box)box.scrollTop=box.scrollHeight;
  },50);
}
function clearCoachChat(){
  if(coachChat.length&&!confirm("Clear this conversation?"))return;
  coachChat=[];re();
}
function coachQuick(msg){
  const input=document.getElementById("coachInput");
  if(input){input.value=msg;sendCoachMsg();}
}

// ── Backup & Restore ──────────────────────────────────────────────────────────
function exportData(){
  const backup={
    app:"Sin Pausa Training",
    version:1,
    exportedAt:new Date().toISOString(),
    data:S
  };
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const dateStr=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`SinPausa_Backup_${dateStr}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const backup=JSON.parse(e.target.result);
      const data=backup.data||backup; // Accept raw state too
      if(!data.logs&&!data.week)throw new Error("Not a valid backup");
      if(!confirm(`Restore backup from ${backup.exportedAt?new Date(backup.exportedAt).toLocaleDateString():"unknown date"}? This replaces ALL current data.`))return;
      S={...def(),...data};
      saveS(S);
      alert("✅ Backup restored! All your data is back.");
      re();
    }catch{
      alert("❌ Couldn't read that file. Make sure it's a Sin Pausa backup (.json).");
    }
  };
  reader.readAsText(file);
}

render();
</script>
